server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;  # 匹配任何访问

    client_max_body_size 10M;

    # 网站根目录
    root /usr/share/nginx/html;
    index index.html;

    # 将 /api 开头的请求代理到后端
    location /api/ {
        proxy_pass http://SGAgent-Blog-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10M;
    }

    # 将 /captcha/ 开头的请求代理到后端
    location /captcha/ {
        proxy_pass http://SGAgent-Blog-server:8080;
        proxy_set_header Host $host;
    }

    # 精准放行 Knife4j 和 Swagger 接口文档所需的关键路径
    location ~ ^/(doc\.html|webjars|v3/api-docs|swagger-resources) {
        proxy_pass http://SGAgent-Blog-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 静态资源配置（关闭缓存，避免并发问题）
    location ~* \.(css|js|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
        add_header Access-Control-Allow-Origin *;
    }

    # Vue 单页应用路由必备 (兜底路由放在最后)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Access-Control-Allow-Origin *;  # 解决跨域
    }
}